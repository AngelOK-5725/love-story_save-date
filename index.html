<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="init.css">
    <title>Love-story_Mia&Ilias</title>
</head>
<body>

    <h1>Однажды они</h1>
    <div class="mia-card-body">
        <div class="variable-box">
            <div class="card-mia">
                <div class="gallery-mia">
                    <img class="i" src="assets/images/мия-1111 2.png" alt="Mia">
                    <img class="i" src="assets/images/мия-111 12.png" alt="Mia">
                    <img class="i-last" src="assets/images/big-post-m.png" alt="Mia">
                </div>
                <div class="text-card-r">
                    <h2 class="h-m">мия</h2>
                    <p class="paragraph">Опасно харизматична.</p>
                    <p class="paragraph">Из тех людей, которые появляются в сюжете не случайно.</p>
                </div>
            </div>
        </div>
    </div>
    <div class="ilias-card-body">
        <div class="variable-box">
            <div class="card-ilias">
                <div class="text-card-l">
                    <h2 class="h-i">ілияс</h2>
                    <p class="paragraph">Такое ощущение, будто у него отдельный саундтрек.</p>
                    <p class="paragraph">Пугающе хорош в том, что делает.</p>
                </div>
                <div class="gallery-ilias">
                    <img class="a" src="assets/images/ilias-1.png" alt="Ilias">
                    <img class="a" src="assets/images/ilias-11.png" alt="Ilias">
                    <img class="a-last" src="assets/images/big-post-i.png" alt="Ilias">
                </div>
            </div>
        </div>
    </div>
    <div class="variable-box">
        <h2>встретились</h2>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
